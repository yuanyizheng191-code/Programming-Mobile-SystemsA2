<div class="page-header">
  <h1>Inventory Management</h1>
  <p>Add, edit & delete items</p>
</div>

<div class="card">
  <div class="form-grid">
    <div class="form-group">
      <label>Item ID</label>
      <input [(ngModel)]="itemId">
    </div>
    <div class="form-group">
      <label>Item Name</label>
      <input [(ngModel)]="itemName">
    </div>
    <div class="form-group">
      <label>Category</label>
      <input [(ngModel)]="category">
    </div>
    <div class="form-group">
      <label>Quantity</label>
      <input type="number" [(ngModel)]="quantity">
    </div>
    <div class="form-group">
      <label>Price</label>
      <input type="number" [(ngModel)]="price">
    </div>
    <div class="form-group">
      <label>Supplier</label>
      <input [(ngModel)]="supplier">
    </div>
  </div>

  <button class="btn btn-primary" (click)="addItem()">Add Item</button>
  <button class="btn btn-warning" (click)="clear()">Clear</button>

  <table>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Category</th>
      <th>Qty</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
    <tr *ngFor="let item of items">
      <td>{{item.itemId}}</td>
      <td>{{item.itemName}}</td>
      <td>{{item.category}}</td>
      <td>{{item.quantity}}</td>
      <td [class]="item.status === 'In Stock' ? 'status-in' : item.status === 'Low Stock' ? 'status-low' : 'status-out'">
        {{item.status}}
      </td>
      <td>
        <button class="btn btn-warning" (click)="editItem(item)">Edit</button>
        <button class="btn btn-danger" (click)="deleteItem(item.itemId)">Delete</button>
      </td>
    </tr>
  </table>
</div>
