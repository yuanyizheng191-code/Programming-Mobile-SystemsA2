<div class="container">
  <h1>Inventory Management</h1>

  <div class="form-card">
    <div class="form-grid">
      <div class="form-group">
        <label>Item ID *</label>
        <input [(ngModel)]="newItem.id" [disabled]="isEditing" type="text" placeholder="Unique ID">
      </div>

      <div class="form-group">
        <label>Item Name *</label>
        <input [(ngModel)]="newItem.name" type="text" placeholder="Name">
      </div>

      <div class="form-group">
  <label>Category *</label>
  <select [(ngModel)]="newItem.category">
    <option value="" disabled selected>-- Select Category --</option>
    <option value="Electronics">Electronics</option>
    <option value="Furniture">Furniture</option>
    <option value="Clothing">Clothing</option>
    <option value="Tools">Tools</option>
    <option value="Miscellaneous">Miscellaneous</option>
  </select>
</div>

      <div class="form-group">
        <label>Quantity *</label>
        <input [(ngModel)]="newItem.quantity" type="number" min="0">
      </div>

      <div class="form-group">
        <label>Price *</label>
        <input [(ngModel)]="newItem.price" type="number" min="0" step="0.01">
      </div>

      <div class="form-group">
        <label>Supplier *</label>
        <input [(ngModel)]="newItem.supplier" type="text" placeholder="Supplier">
      </div>
    </div>

    <div class="form-group checkbox-row">
      <label>
        <input [(ngModel)]="newItem.popular" type="checkbox">
        Mark as Popular
      </label>
    </div>

    <div class="form-group full-width">
      <label>Comments (Optional)</label>
      <textarea [(ngModel)]="newItem.comments" rows="3"></textarea>
    </div>

    <div class="button-row">
      <button (click)="saveItem()" class="btn save">Save</button>
      <button (click)="clearForm()" class="btn clear">Clear</button>
    </div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Category</th>
          <th>Qty</th>
          <th>Price</th>
          <th>Supplier</th>
          <th>Popular</th>
          <th>Status</th>
          <th>Comments</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of items">
          <td>{{ item.id }}</td>
          <td>{{ item.name }}</td>
          <td>{{ item.category }}</td>
          <td>{{ item.quantity }}</td>
          <td>${{ item.price.toFixed(2) }}</td>
          <td>{{ item.supplier }}</td>
          <td>{{ item.popular ? 'Yes' : 'No' }}</td>
          <td>{{ item.status }}</td>
          <td>{{ item.comments || '-' }}</td>
          <td>
            <button (click)="editItem(item)" class="edit-btn">Edit</button>
            <button (click)="deleteItem(item.id)" class="del-btn">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
